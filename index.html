<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- mux.js -->
    <script src="https://cdn.jsdelivr.net/npm/mux.js@6.3.0/dist/mux.min.js"></script>

    <!-- Shaka UI -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.9/dist/controls.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.9/dist/shaka-player.ui.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <title>Shaka Player Demo</title>

    <style>
      body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .video-wrapper {
        position: relative;
        width: 100%;
      }

      #statsBox {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.8);
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 5px;
        color: rgb(0, 255, 255);
        z-index: 100;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <div class="row justify-content-center mb-3">
        <div class="col-8">
          <h3>SHAKA PLAYER</h3>
          <br />
          <p>Replace the URL and Play</p>
        </div>
      </div>

      <!-- INPUT ROW -->
      <div class="row justify-content-center mb-3">
        <div class="col-lg-8">
          <div class="input-group">
            <input
              id="srcInput"
              type="text"
              class="form-control"
              value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
            />
            <button class="btn btn-primary" onclick="loadStream()">Play</button>
          </div>
        </div>
      </div>

      <!-- VIDEO ROW -->
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="video-wrapper">
            <div id="statsBox">Loading stats...</div>

            <div data-shaka-player-container class="w-100">
              <video id="shaka-video" class="w-100" autoplay muted></video>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let player;
      let ui;

      async function initPlayer(manifestUri) {
        const video = document.getElementById("shaka-video");

        if (player) {
          await player.destroy();
        }

        ui = new shaka.ui.Overlay(
          new shaka.Player(video),
          video.parentElement,
          video,
        );

        const controls = ui.getControls();
        player = controls.getPlayer();

        const config = {
          enableTooltips: true,
          seekBarColors: {
            base: "rgba(165, 134, 255, 0.1)",
            buffered: "rgba(255, 255, 255, 0.54)",
            played: "rgb(203, 125, 115)",
          },
          abr: {
            enabled: true,
            useNetworkInformation: true,
            defaultBandwidthEstimate: 2000000,
            switchInterval: 4,
            bandwidthUpgradeTarget: 0.85,
            bandwidthDowngradeTarget: 0.95,
          },
          streaming: {
            lowLatencyMode: true,
            inaccurateManifestTolerance: 0,
            liveSync: {
              enabled: true,
              targetLatency: 3,
            },
            bufferingGoal: 6,
            rebufferingGoal: 1,
            bufferBehind: 30,
            segmentPrefetchLimit: 2,
            updateIntervalSeconds: 1,
            retryParameters: {
              timeout: 3000,
              maxAttempts: 2,
              baseDelay: 100,
            },
          },
          manifest: {
            retryParameters: {
              timeout: 3000,
              maxAttempts: 2,
              baseDelay: 100,
            },
          },
        };

        ui.configure(config);

        try {
          await player.load(manifestUri);
          video.play();
        } catch (error) {
          console.error("Load error:", error);
        }
      }

      function loadStream() {
        const url = document.getElementById("srcInput").value.trim();
        if (!url) return;
        initPlayer(url);
      }

      loadStream();

      const statsBox = document.getElementById("statsBox");

      function updateStats() {
        const video = document.getElementById("shaka-video");

        const resolution =
          video.videoWidth && video.videoHeight
            ? `${video.videoWidth}x${video.videoHeight}`
            : "n/a";

        let bufferSec = 0;
        if (video.buffered.length > 0) {
          const bufferedEnd = video.buffered.end(video.buffered.length - 1);
          bufferSec = (bufferedEnd - video.currentTime).toFixed(2);
        }

        const dropped = video.getVideoPlaybackQuality
          ? video.getVideoPlaybackQuality().droppedVideoFrames
          : "N/A";

        statsBox.innerHTML = `
        Resolution: ${resolution}<br>
        Buffer: ${bufferSec}s<br>
        Dropped Frames: ${dropped}
      `;
      }

      setInterval(updateStats, 1000);
    </script>
  </body>
</html>
